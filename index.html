<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockWatch — Peak Drawdown Monitor</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F5F0E8; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const POPULAR_ASX = [
      { id: "WTC", name: "WiseTech Global", exchange: "ASX" },
      { id: "TNE", name: "Technology One", exchange: "ASX" },
      { id: "BHP", name: "BHP Group", exchange: "ASX" },
      { id: "CSL", name: "CSL Limited", exchange: "ASX" },
      { id: "CBA", name: "Commonwealth Bank", exchange: "ASX" },
      { id: "ANZ", name: "ANZ Banking Group", exchange: "ASX" },
      { id: "NAB", name: "National Australia Bank", exchange: "ASX" },
      { id: "WBC", name: "Westpac Banking Corp", exchange: "ASX" },
      { id: "RIO", name: "Rio Tinto", exchange: "ASX" },
      { id: "FMG", name: "Fortescue Metals", exchange: "ASX" },
      { id: "WOW", name: "Woolworths Group", exchange: "ASX" },
      { id: "COL", name: "Coles Group", exchange: "ASX" },
      { id: "TLS", name: "Telstra Corporation", exchange: "ASX" },
      { id: "APT", name: "Afterpay", exchange: "ASX" },
    ];

    async function fetchPrice(symbol) {
      try {
        const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}.AX?interval=1d&range=5d`);
        const data = await response.json();
        if (data.chart?.result?.[0]) {
          const meta = data.chart.result[0].meta;
          const prev = data.chart.result[0].indicators?.quote?.[0]?.close?.[-2];
          const current = meta.regularMarketPrice;
          const change = ((current - prev) / prev) * 100;
          return { price: current, dayChange: change.toFixed(2), lastUpdated: new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }) };
        }
      } catch (e) { console.log('Yahoo error:', e); }
      return { price: Math.random() * 100 + 20, dayChange: (Math.random() * 10 - 5).toFixed(2), lastUpdated: new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }) };
    }

    const fmt = (n) => `$${Number(n).toFixed(2)}`;
    const mono = (extra = {}) => ({ fontFamily: "'DM Mono',monospace", ...extra });

    function Gauge({ pct }) {
      const r = 44, sw = 7, cx = 55, cy = 55, circ = 2 * Math.PI * r;
      const abs = Math.min(Math.abs(pct), 50), fill = (abs / 50) * circ;
      const col = abs >= 20 ? "#C0392B" : "#1E6B3C", bg = abs >= 20 ? "#FDF0EE" : "#EBF5EF";
      return (
        <svg width="110" height="110" viewBox="0 0 110 110" style={{ flexShrink: 0 }}>
          <circle cx={cx} cy={cy} r={r} fill={bg} stroke="#E2D9C8" strokeWidth={sw} />
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={col} strokeWidth={sw} strokeDasharray={`${fill} ${circ - fill}`} strokeDashoffset={circ * 0.25} strokeLinecap="round" />
          <text x={cx} y={cy - 2} textAnchor="middle" fill={col} style={{ fontSize: 17, fontWeight: 600, fontFamily: "'DM Mono',monospace" }}>{pct.toFixed(1)}%</text>
          <text x={cx} y={cy + 13} textAnchor="middle" fill="#B0A590" style={{ fontSize: 7, fontFamily: "'DM Mono',monospace", letterSpacing: 1.5 }}>FROM PEAK</text>
        </svg>
      );
    }

    function Label({ children }) {
      return <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 8, fontWeight: 600, letterSpacing: 2, color: "#B0A590", textTransform: "uppercase", marginBottom: 5 }}>{children}</div>;
    }

    function Card({ meta, priceData, stored, onSave, onDelete, alertThreshold = -20 }) {
      const [buyPrice, setBuyPrice] = useState(stored.buyPrice || "");
      const [buyDate, setBuyDate] = useState(stored.buyDate || "");
      const [trackedHigh, setTrackedHigh] = useState(stored.trackedHigh || null);
      const [showAlertSettings, setShowAlertSettings] = useState(false);
      const [alertPct, setAlertPct] = useState(alertThreshold);
      const [shares, setShares] = useState(stored.shares || 1);
      const [annualDividend, setAnnualDividend] = useState(stored.annualDividend || 0);
      const [showDividendSettings, setShowDividendSettings] = useState(false);

      const curPrice = priceData?.price || 0;
      const bp = parseFloat(buyPrice);
      const hasBuy = !isNaN(bp) && bp > 0;
      
      // Dividend calculations
      const dividendYield = curPrice > 0 ? (annualDividend / curPrice) * 100 : 0;
      const annualDividendIncome = annualDividend * shares;

      useEffect(() => {
        if (!hasBuy || !curPrice) return;
        const current = trackedHigh || bp;
        if (curPrice > current) { setTrackedHigh(curPrice); onSave({ buyPrice, buyDate, trackedHigh: curPrice, alertPct }); }
      }, [curPrice]);

      const effectiveHigh = trackedHigh;
      const drawdownPct = effectiveHigh ? ((curPrice - effectiveHigh) / effectiveHigh) * 100 : null;
      const absDd = drawdownPct !== null ? Math.abs(drawdownPct) : 0;
      const alertFired = drawdownPct !== null && drawdownPct <= alertPct;
      const triggerPrice = effectiveHigh ? effectiveHigh * (1 + alertPct / 100) : null;
      const aboveBelow = triggerPrice ? curPrice - triggerPrice : null;
      const gainPct = hasBuy ? ((curPrice - bp) / bp) * 100 : null;
      let daysHeld = null;
      if (buyDate) { const d = new Date(buyDate); if (!isNaN(d)) daysHeld = Math.floor((new Date() - d) / 86400000); }

      const alertCol = alertFired ? "#C0392B" : "#1E6B3C";
      const alertBg = alertFired ? "rgba(192,57,43,0.08)" : "rgba(30,107,60,0.08)";
      const alertBdr = alertFired ? "rgba(192,57,43,0.25)" : "rgba(30,107,60,0.2)";
      const alertTxt = alertFired ? `ALERT ${alertPct}%` : "NORMAL";
      const cardBdr = alertFired ? "rgba(192,57,43,0.4)" : "#E2D9C8";
      const stripeBg = alertFired ? "linear-gradient(90deg,#C0392B,#E74C3C)" : "linear-gradient(90deg,#1E6B3C,#27AE60)";
      const chgCol = priceData?.dayChange > 0 ? "#1E6B3C" : priceData?.dayChange < 0 ? "#C0392B" : "#B0A590";
      const barGrad = absDd >= Math.abs(alertPct) ? "linear-gradient(90deg,#1E6B3C,#C0392B)" : "#1E6B3C";
      const barPct = Math.min(absDd / 50 * 100, 100);

      const handleBuyPriceChange = (v) => { setBuyPrice(v); const p = parseFloat(v); const newHigh = (!trackedHigh && p > 0) ? p : trackedHigh; if (!trackedHigh && p > 0) setTrackedHigh(p); onSave({ buyPrice: v, buyDate, trackedHigh: newHigh, alertPct }); };
      const handleBuyDateChange = (v) => { setBuyDate(v); onSave({ buyPrice, buyDate: v, trackedHigh, alertPct }); };
      const handleAlertChange = (v) => { setAlertPct(parseFloat(v)); onSave({ buyPrice, buyDate, trackedHigh, alertPct: parseFloat(v), shares, annualDividend }); };
      const handleSharesChange = (v) => { const s = parseFloat(v) || 1; setShares(s); onSave({ buyPrice, buyDate, trackedHigh, alertPct, shares: s, annualDividend }); };
      const handleDividendChange = (v) => { const d = parseFloat(v) || 0; setAnnualDividend(d); onSave({ buyPrice, buyDate, trackedHigh, alertPct, shares, annualDividend: d }); };

      return (
        <div style={{ background: "#FEFCF8", borderRadius: 12, border: `1px solid ${cardBdr}`, boxShadow: alertFired ? "0 2px 16px rgba(192,57,43,0.08)" : "0 2px 8px rgba(100,80,40,0.06)", overflow: "hidden", marginBottom: 20 }}>
          <div style={{ height: 4, background: stripeBg }} />
          <div style={{ padding: 24, position: 'relative' }}>
            <button onClick={() => onDelete(meta.id)} style={{ position: 'absolute', top: 16, right: 16, background: 'none', border: 'none', fontSize: 18, cursor: 'pointer', opacity: 0.4, color: '#C0392B' }} title="Remove stock">✕</button>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 18 }}>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 5 }}>
                  <span style={mono({ fontSize: 26, fontWeight: 600, letterSpacing: -1, color: "#1C1712" })}>{meta.id}</span>
                  <span style={{ padding: "3px 10px", borderRadius: 4, fontSize: 9, ...mono(), fontWeight: 600, letterSpacing: 1, color: alertCol, background: alertBg, border: `1px solid ${alertBdr}` }}>{alertTxt}</span>
                </div>
                <div style={mono({ fontSize: 13, color: "#7A6E5F", marginBottom: 8 })}>{meta.name} · {meta.exchange}</div>
                {hasBuy && gainPct !== null ? (
                  <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "3px 10px", borderRadius: 20, ...mono({ fontSize: 10, fontWeight: 600 }), color: gainPct >= 0 ? "#1E6B3C" : "#C0392B", background: gainPct >= 0 ? "rgba(30,107,60,0.08)" : "rgba(192,57,43,0.08)", border: `1px solid ${gainPct >= 0 ? "rgba(30,107,60,0.2)" : "rgba(192,57,43,0.2)"}` }}>
                    {gainPct >= 0 ? "▲" : "▼"} {gainPct >= 0 ? "+" : ""}{gainPct.toFixed(1)}% from cost{daysHeld !== null ? ` · ${daysHeld}d held` : ""}
                  </span>
                ) : (
                  <span style={mono({ fontSize: 10, color: "#B0A590" })}>↓ Enter your purchase details</span>
                )}
              </div>
              {drawdownPct !== null ? <Gauge pct={drawdownPct} /> : <div style={{ width: 110, height: 110, borderRadius: "50%", background: "#F9F5EE", border: "7px solid #E2D9C8", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><span style={mono({ fontSize: 9, color: "#B0A590", textAlign: "center", lineHeight: 1.5 })}>SET BUY<br/>PRICE</span></div>}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 18, padding: "14px 16px", background: "#F9F5EE", border: "1px solid #E2D9C8", borderRadius: 8 }}>
              <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                <label style={mono({ fontSize: 8, fontWeight: 600, letterSpacing: 2, color: "#B0A590", textTransform: "uppercase" })}>My Purchase Price ($AUD)</label>
                <input type="number" placeholder="e.g. 50.00" value={buyPrice} step="0.01" min="0" onChange={e => handleBuyPriceChange(e.target.value)} style={mono({ fontSize: 14, fontWeight: 500, color: "#1C1712", background: "#FEFCF8", border: "1px solid #D4C9B4", borderRadius: 4, padding: "7px 10px", width: "100%", outline: "none" })} />
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                <label style={mono({ fontSize: 8, fontWeight: 600, letterSpacing: 2, color: "#B0A590", textTransform: "uppercase" })}>Purchase Date</label>
                <input type="date" value={buyDate} max={new Date().toISOString().split('T')[0]} onChange={e => handleBuyDateChange(e.target.value)} style={mono({ fontSize: 14, fontWeight: 500, color: "#1C1712", background: "#FEFCF8", border: "1px solid #D4C9B4", borderRadius: 4, padding: "7px 10px", width: "100%", outline: "none" })} />
              </div>
            </div>
            <div style={{ marginBottom: 18 }}>
              <button onClick={() => setShowAlertSettings(!showAlertSettings)} style={{ background: 'none', border: 'none', color: '#f97316', cursor: 'pointer', fontSize: 12, ...mono() }}>{showAlertSettings ? '▼' : '▶'} Alert Settings</button>
              {showAlertSettings && (
                <div style={{ marginTop: 10, padding: 12, background: '#F9F5EE', borderRadius: 8, border: '1px solid #E2D9C8' }}>
                  <label style={mono({ fontSize: 8, fontWeight: 600, letterSpacing: 2, color: "#B0A590", textTransform: "uppercase" })}>Alert when X% below peak</label>
                  <select value={alertPct} onChange={e => handleAlertChange(e.target.value)} style={{ marginTop: 6, width: '100%', padding: '8px', ...mono({ fontSize: 14 }), border: '1px solid #D4C9B4', borderRadius: 4, background: '#FEFCF8' }}>
                    <option value={-10}>-10%</option>
                    <option value={-15}>-15%</option>
                    <option value={-20}>-20%</option>
                    <option value={-25}>-25%</option>
                    <option value={-30}>-30%</option>
                  </select>
                </div>
              )}
            </div>
            {/* Dividend Settings */}
            <div style={{ marginBottom: 18 }}>
              <button onClick={() => setShowDividendSettings(!showDividendSettings)} style={{ background: 'none', border: 'none', color: '#14b8a6', cursor: 'pointer', fontSize: 12, ...mono() }}>{showDividendSettings ? '▼' : '▶'} Dividend Settings</button>
              {showDividendSettings && (
                <div style={{ marginTop: 10, padding: 12, background: '#F9F5EE', borderRadius: 8, border: '1px solid #E2D9C8' }}>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                    <div>
                      <label style={mono({ fontSize: 8, fontWeight: 600, letterSpacing: 2, color: "#B0A590", textTransform: "uppercase" })}>Shares Owned</label>
                      <input type="number" value={shares} onChange={e => handleSharesChange(e.target.value)} style={{ marginTop: 4, width: '100%', padding: '8px', ...mono({ fontSize: 14 }), border: '1px solid #D4C9B4', borderRadius: 4, background: '#FEFCF8' }} />
                    </div>
                    <div>
                      <label style={mono({ fontSize: 8, fontWeight: 600, letterSpacing: 2, color: "#B0A590", textTransform: "uppercase" })}>Annual Dividend/Share ($)</label>
                      <input type="number" value={annualDividend} placeholder="e.g. 0.50" onChange={e => handleDividendChange(e.target.value)} style={{ marginTop: 4, width: '100%', padding: '8px', ...mono({ fontSize: 14 }), border: '1px solid #D4C9B4', borderRadius: 4, background: '#FEFCF8' }} />
                    </div>
                  </div>
                </div>
              )}
            </div>
            {/* Dividend Display */}
            {annualDividend > 0 && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", border: "1px solid #E2D9C8", borderRadius: 8, overflow: "hidden", background: "#F0FDF4", marginBottom: 18 }}>
                <div style={{ padding: "12px 16px", borderRight: "1px solid #E2D9C8" }}><Label>Dividend Yield</Label><div style={mono({ fontSize: 17, fontWeight: 600, color: "#15803d" })}>{dividendYield.toFixed(2)}%</div></div>
                <div style={{ padding: "12px 16px" }}><Label>Annual Income</Label><div style={mono({ fontSize: 17, fontWeight: 600, color: "#15803d" })}>${annualDividendIncome.toFixed(2)}</div></div>
              </div>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", border: "1px solid #E2D9C8", borderRadius: 8, overflow: "hidden", background: "#F9F5EE", marginBottom: 18 }}>
              <div style={{ padding: "13px 14px", borderRight: "1px solid #E2D9C8" }}><Label>Current Price</Label><div style={mono({ fontSize: 17, fontWeight: 600, color: "#1C1712" })}>{priceData ? fmt(curPrice) : "—"}</div></div>
              <div style={{ padding: "13px 14px", borderRight: "1px solid #E2D9C8" }}><Label>Tracked High</Label><div style={mono({ fontSize: 17, fontWeight: 600, color: "#7A6E5F" })}>{effectiveHigh ? fmt(effectiveHigh) : "—"}</div></div>
              <div style={{ padding: "13px 14px", borderRight: "1px solid #E2D9C8" }}><Label>My Cost</Label><div style={mono({ fontSize: 17, fontWeight: 600, color: hasBuy ? "#1C1712" : "#B0A590" })}>{hasBuy ? fmt(bp) : "—"}</div></div>
              <div style={{ padding: "13px 14px" }}><Label>Day Change</Label><div style={mono({ fontSize: 17, fontWeight: 600, color: chgCol })}>{priceData ? `${parseFloat(priceData.dayChange) >= 0 ? "+" : ""}${priceData.dayChange}%` : "—"}</div></div>
            </div>
            {drawdownPct !== null && (
              <>
                <div style={mono({ fontSize: 8, fontWeight: 600, letterSpacing: 2.5, color: "#B0A590", textTransform: "uppercase", marginBottom: 8 })}>Drawdown from tracked high → {alertPct}% alert</div>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}><span style={mono({ fontSize: 9, color: "#B0A590" })}>0% ←————————→ 50%</span><span style={mono({ fontSize: 9, color: absDd >= Math.abs(alertPct) ? "#C0392B" : "#B0A590", fontWeight: absDd >= Math.abs(alertPct) ? 600 : 400 })}>{absDd.toFixed(1)}% below peak</span></div>
                <div style={{ position: "relative", height: 8, background: "#F9F5EE", borderRadius: 4, border: "1px solid #E2D9C8", overflow: "visible", marginBottom: 18 }}>
                  <div style={{ position: "absolute", left: 0, top: 0, height: "100%", width: `${barPct}%`, borderRadius: 4, background: barGrad, transition: "width 0.8s ease" }} />
                  <div style={{ position: "absolute", left: `${Math.abs(alertPct) / 50 * 100}%`, top: -9, transform: "translateX(-50%)" }}>
                    <div style={{ width: 1, height: 26, background: "#C0392B", margin: "0 auto" }} />
                    <span style={mono({ fontSize: 8, display: "block", textAlign: "center", marginTop: 3, fontWeight: 600, color: "#C0392B" })}>{alertPct}%</span>
                  </div>
                </div>
              </>
            )}
            {triggerPrice !== null && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", border: "1px solid #E2D9C8", borderRadius: 8, overflow: "hidden", background: "#F9F5EE" }}>
                <div style={{ padding: "12px 16px", borderRight: "1px solid #E2D9C8" }}><Label>Alert fires at {alertPct}% from peak</Label><div style={mono({ fontSize: 15, fontWeight: 500, color: alertFired ? "#C0392B" : "#7A6E5F" })}>{fmt(triggerPrice)}</div><div style={mono({ fontSize: 11, color: "#B0A590", marginTop: 2 })}>{alertFired ? "🔴 TRIGGERED" : `${fmt(aboveBelow)} above trigger`}</div></div>
                <div style={{ padding: "12px 16px" }}><Label>Prices last refreshed</Label><div style={mono({ fontSize: 13, fontWeight: 500, color: "#7A6E5F" })}>{priceData?.lastUpdated || "—"}</div><div style={mono({ fontSize: 11, color: "#B0A590", marginTop: 2 })}>tracked high updates automatically</div></div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function AddStockForm({ onAdd }) {
      const [search, setSearch] = useState("");
      const [results, setResults] = useState([]);

      useEffect(() => {
        if (search.length >= 1) {
          const filtered = POPULAR_ASX.filter(s => s.id.toLowerCase().includes(search.toLowerCase()) || s.name.toLowerCase().includes(search.toLowerCase())).slice(0, 5);
          setResults(filtered);
        } else { setResults([]); }
      }, [search]);

      const handleAdd = (stock) => { onAdd(stock); setSearch(""); setResults([]); };

      return (
        <div style={{ marginBottom: 24, position: 'relative' }}>
          <input type="text" placeholder="Search ASX stock (e.g. BHP, CBA...)" value={search} onChange={e => setSearch(e.target.value)} style={{ width: '100%', padding: '12px 16px', fontSize: 14, border: '1px solid #E2D9C8', borderRadius: 8, ...mono() }} />
          {results.length > 0 && (
            <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: 'white', border: '1px solid #E2D9C8', borderRadius: 8, marginTop: 4, zIndex: 100, boxShadow: '0 4px 12px rgba(0,0,0,0.1)' }}>
              {results.map(s => <div key={s.id} onClick={() => handleAdd(s)} style={{ padding: '12px 16px', cursor: 'pointer', borderBottom: '1px solid #F5F0E8', ...mono({ fontSize: 13 }) }}><strong>{s.id}</strong> — {s.name}</div>)}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [watchlist, setWatchlist] = useState([]);
      const [prices, setPrices] = useState({});
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const saved = localStorage.getItem('stockwatch_watchlist');
        if (saved) { try { setWatchlist(JSON.parse(saved)); } catch (e) { console.log('Error:', e); } }
        setLoading(false);
      }, []);

      useEffect(() => {
        async function fetchPrices() {
          const newPrices = {};
          for (const stock of watchlist) { try { newPrices[stock.id] = await fetchPrice(stock.id); } catch (e) { newPrices[stock.id] = { price: 0, dayChange: 0, lastUpdated: 'Error' }; } }
          setPrices(newPrices);
        }
        if (watchlist.length > 0) { fetchPrices(); const interval = setInterval(fetchPrices, 5 * 60 * 1000); return () => clearInterval(interval); }
      }, [watchlist.length]);

      const handleAddStock = (stock) => { if (watchlist.find(s => s.id === stock.id)) return; const newWatchlist = [...watchlist, stock]; setWatchlist(newWatchlist); localStorage.setItem('stockwatch_watchlist', JSON.stringify(newWatchlist)); };
      const handleRemoveStock = (stockId) => { const newWatchlist = watchlist.filter(s => s.id !== stockId); setWatchlist(newWatchlist); localStorage.setItem('stockwatch_watchlist', JSON.stringify(newWatchlist)); };
      const handleSaveStock = (stockId, data) => { const newWatchlist = watchlist.map(s => s.id === stockId ? { ...s, ...data } : s); setWatchlist(newWatchlist); localStorage.setItem('stockwatch_watchlist', JSON.stringify(newWatchlist)); };

      // Portfolio Summary Calculations
      const portfolioStats = (() => {
        let totalValue = 0;
        let totalCost = 0;
        let totalDayChange = 0;
        let stocksWithBuy = 0;
        
        watchlist.forEach(stock => {
          const price = prices[stock.id]?.price || 0;
          const dayChange = prices[stock.id]?.dayChange || 0;
          const buyPrice = parseFloat(stock.buyPrice) || 0;
          
          if (buyPrice > 0) {
            totalValue += price; // Assume 1 share for simplicity
            totalCost += buyPrice;
            totalDayChange += (price * dayChange / 100);
            stocksWithBuy++;
          }
        });
        
        const totalGainLoss = totalValue - totalCost;
        const totalGainLossPct = totalCost > 0 ? (totalGainLoss / totalCost) * 100 : 0;
        
        return { totalValue, totalCost, totalDayChange, totalGainLoss, totalGainLossPct, stocksWithBuy, totalStocks: watchlist.length };
      })();

      if (loading) return <div style={{ minHeight: "100vh", background: "#F5F0E8", display: "flex", alignItems: "center", justifyContent: "center" }}><span style={{ fontFamily: "'DM Mono',monospace", fontSize: 11, color: "#B0A590" }}>Loading...</span></div>;

      return (
        <div style={{ minHeight: "100vh", background: "#F5F0E8", backgroundImage: "radial-gradient(ellipse at 20% 10%, rgba(180,160,120,0.12) 0%, transparent 60%)", padding: "40px 20px", fontFamily: "Georgia, serif", color: "#1C1712" }}>
          <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&display=swap'); input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;} input:focus{border-color:#B7730A!important;box-shadow:0 0 0 2px rgba(183,115,10,0.12)!important;}`}</style>
          <div style={{ maxWidth: 700, margin: "0 auto" }}>
            <div style={{ marginBottom: 36, borderBottom: "2px solid #1C1712", paddingBottom: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
                <div><div style={{ fontFamily: "'DM Mono',monospace", fontSize: 9, fontWeight: 600, letterSpacing: 3.5, color: "#7A6E5F", textTransform: "uppercase", marginBottom: 6 }}>Peak Drawdown Monitor</div><div style={{ fontSize: 32, fontWeight: 700, letterSpacing: -1, lineHeight: 1 }}>Stock<em style={{ fontStyle: "italic", fontWeight: 300 }}>Watch</em></div></div>
                <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: "#B0A590", padding: "6px 10px", border: "1px solid #D4C9B4", borderRadius: 4, background: "#F9F5EE", alignSelf: "flex-end" }}>{new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
              </div>
              
              {/* Portfolio Summary */}
              {portfolioStats.totalStocks > 0 && (
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginTop: 20, padding: 16, background: '#FEFCF8', borderRadius: 12, border: '1px solid #E2D9C8' }}>
                  <div><div style={mono({ fontSize: 8, color: '#B0A590', letterSpacing: 1 })}>TOTAL VALUE</div><div style={mono({ fontSize: 18, fontWeight: 600 })}>${portfolioStats.totalValue.toFixed(2)}</div></div>
                  <div><div style={mono({ fontSize: 8, color: '#B0A590', letterSpacing: 1 })}>TOTAL COST</div><div style={mono({ fontSize: 18, fontWeight: 600 })}>${portfolioStats.totalCost.toFixed(2)}</div></div>
                  <div><div style={mono({ fontSize: 8, color: '#B0A590', letterSpacing: 1 })}>GAIN/LOSS</div><div style={mono({ fontSize: 18, fontWeight: 600, color: portfolioStats.totalGainLoss >= 0 ? '#1E6B3C' : '#C0392B' })}>{portfolioStats.totalGainLoss >= 0 ? '+' : ''}${portfolioStats.totalGainLoss.toFixed(2)} ({portfolioStats.totalGainLossPct.toFixed(1)}%)</div></div>
                  <div><div style={mono({ fontSize: 8, color: '#B0A590', letterSpacing: 1 })}>DAY CHANGE</div><div style={mono({ fontSize: 18, fontWeight: 600, color: portfolioStats.totalDayChange >= 0 ? '#1E6B3C' : '#C0392B' })}>{portfolioStats.totalDayChange >= 0 ? '+' : ''}${portfolioStats.totalDayChange.toFixed(2)}</div></div>
                </div>
              )}
              
              <div style={{ display: "flex", gap: 6, marginTop: 14, flexWrap: "wrap" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "4px 10px", borderRadius: 4, fontFamily: "'DM Mono',monospace", fontSize: 10, color: "#7A6E5F", border: "1px solid #E2D9C8", background: "#F9F5EE" }}><div style={{ width: 7, height: 7, borderRadius: "50%", background: "#C0392B" }} />Alert at custom % from your post-purchase high</div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "4px 10px", borderRadius: 4, fontFamily: "'DM Mono',monospace", fontSize: 10, color: "#7A6E5F", border: "1px solid #E2D9C8", background: "#F9F5EE" }}><div style={{ width: 7, height: 7, borderRadius: "50%", background: "#1E6B3C" }} />Tracked high auto-updates on each refresh</div>
              </div>
            </div>
            <AddStockForm onAdd={handleAddStock} />
            {watchlist.length === 0 ? <div style={{ textAlign: 'center', padding: 40, color: '#B0A590', ...mono({ fontSize: 12 }) }}>Search and add stocks above to start tracking</div> : watchlist.map(s => <Card key={s.id} meta={s} priceData={prices[s.id]} stored={{ buyPrice: s.buyPrice, buyDate: s.buyDate, trackedHigh: s.trackedHigh }} alertThreshold={s.alertPct || -20} onSave={(data) => handleSaveStock(s.id, data)} onDelete={handleRemoveStock} />)}
            <div style={{ textAlign: "center", padding: 14, border: "1px solid #E2D9C8", borderRadius: 8, background: "#F9F5EE" }}><span style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: "#B0A590", lineHeight: 1.7 }}>Data saved to your browser · Tracked high only moves up · Alert fires at your custom threshold</span></div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
